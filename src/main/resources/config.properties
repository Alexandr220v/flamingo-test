# Restful Booker
api.booker.baseUrl=https://restful-booker.herokuapp.com
api.booker.username=admin
api.booker.password=password123

# GraphQL (Hygraph Video Streaming playground ? supports first/skip pagination)
api.graphql.url=https://us-east-1-shared-usea1-02.cdn.hygraph.com/content/clpvcopq3aavs01usft1idkgj/master

# GraphQL Ecommerce (Shopify Mock Store ? Relay-style pagination)
