name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run API tests
        run: mvn -B -Dgroups=api test
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-api
          path: target/surefire-reports
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: target/allure-results

  ui:
    name: UI tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Install Playwright browsers
        run: mvn -B compile exec:java -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium" -D exec.classpathScope=compile
      - name: Run UI tests
        run: mvn -B -Dgroups=ui -Dui.headless=true test
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-ui
          path: target/surefire-reports
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: target/allure-results

  publish-report:
    name: Generate & Publish Allure Report
    needs: [api, ui]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create combined results directory
        run: mkdir -p allure-results-combined

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-api
          path: allure-results-combined

      - name: Download UI Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-ui
          path: allure-results-combined

      - name: Load Allure history from GitHub Pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy history to results
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history allure-results-combined/
          fi

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@v1.11
        with:
          allure_results: allure-results-combined
          allure_report: allure-report
          allure_history: allure-history

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
